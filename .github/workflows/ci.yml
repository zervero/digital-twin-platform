# CI for every PR and every push to main.
# V1 covers lint / typecheck / test / build on Linux. Desktop and Windows
# builds (Tauri) get their own jobs in V2 once the toolchain is on the CI image.

name: CI

# Pin bash as the run shell for every step. Linux defaults to bash
# already, so this is a no-op there; on Windows it overrides the
# PowerShell default, which would otherwise fail every pnpm
# invocation that hits a Unix-style shell snippet.
defaults:
  run:
    shell: bash

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Honor the project's pnpm version.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Version is read from `packageManager` in package.json so the
        # root manifest stays the single source of truth. Keep them in
        # sync, or pnpm install will fail with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        # v5 targets Node 24 natively; v4 was being force-bumped by the
        # runner and emitting a deprecation warning on every run.
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Run V2 smoke
        # Boots the BFF against the freshly built repo, exercises
        # /health, /api/stream, and the structured logger. This is
        # the single signal that the realtime path is end-to-end
        # healthy before we cut a release.
        run: pnpm smoke:v2
        env:
          PORT: 3001


  chart:
    name: Helm chart lint / render / kubeconform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Same as the verify job: read the version from package.json's
        # `packageManager` field. Keep them in sync or pnpm install
        # fails with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Helm
        # helm is a Go binary with no apt package on Ubuntu runners.
        # Pull from the official installer script and pin to the same
        # major version we test locally (4.x).
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 -o get_helm.sh
          chmod +x get_helm.sh
          ./get_helm.sh --version v4.2.2 --no-sudo
          helm version

      - name: Install kubeconform
        # kubeconform is a Go binary distributed as a tarball. Download
        # the matching linux-amd64 release and drop it on PATH.
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate chart (helm lint + kubeconform -strict)
        # Gates the PR. Both the default and the cert-manager overlay
        # paths must pass -- see scripts/chart-lint-strict.sh for the
        # exact validation strategy.
        run: pnpm chart:lint:strict


  windows:
    name: Windows · Lint / Typecheck / Test
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      # Match the verify job: pnpm version comes from package.json's
      # packageManager field, not a hardcoded number, and corepack
      # never prompts interactively in CI.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Version is read from `packageManager` in package.json so the
        # root manifest stays the single source of truth. Keep them in
        # sync, or pnpm install will fail with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        # v5 targets Node 24 natively; v4 was being force-bumped by the
        # runner and emitting a deprecation warning on every run.
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
