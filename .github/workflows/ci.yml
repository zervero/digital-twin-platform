# CI for every PR and every push to main.
# V1 covers lint / typecheck / test / build on Linux. Desktop and Windows
# builds (Tauri) get their own jobs in V2 once the toolchain is on the CI image.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Honor the project's pnpm version.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
