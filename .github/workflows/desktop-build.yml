# desktop-build: signed + notarized Tauri desktop distribution.
# V3.2 (Track H) ships this to graduate the V1 "Tauri runs locally"
# story into a release artifact. Triggered by:
#   - push of a `v*` tag (release-please-driven release path)
#   - workflow_dispatch (operator manual re-run / fallback)
# PRs do NOT trigger this workflow - Tauri bundling is 10-15 min per
# platform and would dominate CI minute usage. PR-time Tauri compile
# checks live in the existing CI `windows` job (typecheck / lint /
# test on windows-latest) and a future `cargo check` smoke job.

name: Desktop Build

# bash everywhere so the same step bodies work on macOS / Linux /
# Windows runners without per-step shell overrides.
defaults:
  run:
    shell: bash

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v5.0.0). Leave blank for HEAD.'
        required: false
        default: ''

# Minimal permissions - `contents: write` only because tauri-action
# uploads release artifacts to a draft GitHub Release on the tag.
# `pull-requests: write` is added in T7 when the release job starts
# commenting on PRs.
permissions:
  contents: write

# Cancel in-progress duplicate runs so a re-pushed tag does not
# leave a stale workflow running alongside the new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS: universal2 (aarch64 + x86_64) .dmg, signed via Apple
  # Developer ID and notarized via Apple notary service. Requires
  # APPLE_* secrets from the operator; see docs/development/
  # desktop-signing.md. There is no unsigned macOS path because
  # unsigned .dmg artifacts trigger Gatekeeper warnings that block
  # end users.
  macos:
    name: Desktop / macOS (.dmg)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Version read from `packageManager` in package.json so the
        # root manifest stays the single source of truth. Keep them
        # in sync or pnpm install fails with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        # v5 targets Node 24 natively; v4 was being force-bumped by
        # the runner and emitting a deprecation warning on every run.
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build + sign + notarize (.dmg)
        # tauri-action orchestrates the Tauri build, signing, and
        # notarization in one step. tagName is read from the
        # triggering ref; releaseDraft=true so T7's release job can
        # finalize the GitHub Release after all platforms succeed.
        # Per docs/development/desktop-signing.md, all 7 secrets
        # below are required; if any is missing, tauri-action fails
        # fast with a clear error.
        uses: tauri-apps/tauri-action@v0
        env:
          # Apple notarization + signing; all from GH secrets.
          # Operator setup is documented in desktop-signing.md.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater keypair from T3. The keypair is regenerated by
          # the operator before the first prod release; see
          # desktop-signing.md "Known quirks" for why this env var
          # is set explicitly to "" when the key has no password
          # (macOS keychain lookup would otherwise fail with
          # `Device not configured (os error 6)`).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Inject the triggering tag so tauri-action uses it as the
          # version (overrides the `0.1.0` placeholder in
          # tauri.conf.json) and as the target of the draft release.
          tagName: ${{ github.ref_name }}
          releaseName: "digital-twin-platform ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false

  # Windows: .msi signed via Windows Authenticode. WINDOWS_CERTIFICATE
  # is optional in V3.2 (an unsigned .msi is allowed for dev / contributor
  # releases; SmartScreen warns but does not block first-party installs).
  # The required env vars mirror the macOS job's updater ones so the
  # signed `latest.json` is produced even when the .msi is unsigned.
  # The windows-latest runner ships with the Windows SDK + signtool
  # preinstalled; tauri-action invokes the right toolchain internally.
  windows:
    name: Desktop / Windows (.msi)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Version read from `packageManager` in package.json so the
        # root manifest stays the single source of truth.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build + sign (.msi)
        # tauri-action orchestrates the Tauri build and signing in
        # one step. If WINDOWS_CERTIFICATE is unset the bundle is
        # built unsigned; this is intentional so a contributor can
        # run a dev release without a code-signing cert. Production
        # releases (release-please-driven) should always have the
        # cert set; see docs/development/desktop-signing.md.
        uses: tauri-apps/tauri-action@v0
        env:
          # Authenticode signing; both from GH secrets. Optional in
          # V3.2 - see the per-job comment above.
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Updater keypair from T3. Same macOS-keychain quirk note
          # applies on windows-latest runners too: if the key has no
          # password, the GH secret should still be set to an empty
          # string. See desktop-signing.md "Known quirks".
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "digital-twin-platform ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false

  # Linux: .AppImage + .deb + .rpm. ALL UNSIGNED in V3.2 -
  # GPG signing for Linux artifacts is a V3.2.x follow-up.
  # Trust relies on GitHub Release provenance, not artifact
  # signatures. The updater payload (`latest.json` + `.sig`)
  # IS still signed via the same TAURI_SIGNING_PRIVATE_KEY
  # env vars as the other platforms, because that signature
  # is what makes the in-app update channel trustworthy.
  linux:
    name: Desktop / Linux (.AppImage + .deb + .rpm)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        # Version read from `packageManager` in package.json so
        # the root manifest stays the single source of truth.
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.17.1
          cache: pnpm

      - name: Install system deps
        # Tauri 2 Linux needs webkit2gtk-4.1 + a handful of
        # supporting libs. The pinned package names match
        # Tauri's official Linux build guide
        # (https://v2.tauri.app/start/prerequisites/#linux);
        # a Tauri minor version bump is the only thing that
        # would invalidate this list.
        run: |
          sudo apt-get update
          sudo apt-get install -y             libwebkit2gtk-4.1-dev             build-essential             curl             wget             file             libxdo-dev             libssl-dev             libayatana-appindicator3-dev             librsvg2-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (.AppImage + .deb + .rpm)
        # bundle.targets: "all" in tauri.conf.json makes
        # tauri-action emit all three formats. Artifacts are
        # unsigned in V3.2 - intentional, see job comment.
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater keypair from T3. NO Linux code-signing
          # secrets (WINDOWS_*, APPLE_*) - all three Linux
          # bundle formats are unsigned in V3.2. The updater
          # payload is still signed here so installed copies
          # detect the new release via the in-app updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "digital-twin-platform ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false

  # release: finalization job. Runs after macos, windows, and
  # linux all succeed. Each platform's tauri-action step
  # uploads its artifacts to the SAME draft GitHub Release
  # (they share `tagName`), so when this job runs the draft
  # already has all three sets of artifacts attached. The job:
  #
  # 1. Verifies the draft exists, has the right tag, and is
  #    still in draft state (sanity check).
  # 2. Promotes the draft to a public release
  #    (`gh release edit --draft=false`). This makes the
  #    release visible on the GitHub Releases page and the
  #    `latest` JSON manifest that the Tauri updater polls
  #    starts resolving to it.
  #
  # Failure mode (plan T7 Step 7.1): if any of the three
  # platform jobs fails, this job skips via the `if` chain
  # and the draft stays as a draft. The operator then decides
  # whether to delete the draft, retry the failing platform,
  # or cut a fresh release once the underlying issue is fixed.
  release:
    name: Desktop / Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [macos, windows, linux]
    timeout-minutes: 5
    # `always()` is needed because we want to evaluate the
    # success-chain even when a needed job failed; combined
    # with the explicit `result == 'success'` checks, this
    # makes the job skip on any partial failure.
    if: ${{ always() && needs.macos.result == 'success' && needs.windows.result == 'success' && needs.linux.result == 'success' }}
    steps:
      - name: Verify draft release exists
        # Sanity check that tauri-action uploaded the draft
        # release. If this fails the operator should look at
        # the failing platform job(s) before retrying.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json isDraft,name,tagName

      - name: Promote draft to public release
        # Flips the release from draft to public so end users
        # see it on the GitHub Releases page and the in-app
        # updater's `releases/latest/download/latest.json`
        # endpoint starts returning the new version. The
        # `--draft=false` flag is the only change; we leave
        # `prerelease` as `false` (already set by the
        # platform jobs) so the release is treated as stable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
