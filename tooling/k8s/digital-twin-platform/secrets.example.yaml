# OIDC Secret -- TEMPLATE ONLY, not a real Secret.
#
# The .example suffix is intentional: `kubectl apply -f secrets.example.yaml`
# fails because kubectl won't apply a non-existent kind. Operators MUST
# rename this to secrets.yaml and fill in the values before applying.
#
# The BFF's Deployment reads OIDC_ISSUER_URL / OIDC_AUDIENCE /
# OIDC_CLIENT_ID via env.valueFrom.secretKeyRef, expecting these exact
# keys in a Secret named in values.yaml's `bff.oidc.secretName` (default:
# `bff-oidc-secret`).
#
# Provision with one of:
#   kubectl create secret generic bff-oidc-secret \
#     --from-literal=OIDC_ISSUER_URL=https://your-issuer/ \
#     --from-literal=OIDC_AUDIENCE=... \
#     --from-literal=OIDC_CLIENT_ID=...
#
#   # or sealed-secrets:
#   kubeseal --format yaml < secrets.yaml > sealed-secret.yaml
#
#   # or external-secrets:
#   # see https://external-secrets.io/

apiVersion: v1
kind: Secret
metadata:
  name: bff-oidc-secret
  namespace: digital-twin-platform
type: Opaque
stringData:
  OIDC_ISSUER_URL: "https://REPLACE-ME.auth0.com/"
  OIDC_AUDIENCE:   "https://REPLACE-ME"
  OIDC_CLIENT_ID:  "REPLACE-ME"
