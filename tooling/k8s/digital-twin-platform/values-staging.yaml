# Staging values overlay. Single replica, dev-sized resources,
# no ingress (use `kubectl port-forward svc/dtp-web 8080:80`
# to access the web UI).

bff:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    logLevel: debug
    nodeEnv: staging
    authProvider: mock   # skip OIDC in staging for fast iteration

web:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

global:
  ingress:
    enabled: false

  certManager:
    enabled: false
