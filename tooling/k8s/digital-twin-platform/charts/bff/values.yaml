# Subchart-local values for the BFF. The umbrella's values.yaml
# is the canonical source; these are the defaults if the BFF
# is installed standalone via `helm install bff charts/bff`.
enabled: true
replicaCount: 1
image:
  repository: ghcr.io/zervero/digital-twin-platform-bff
  tag: ""
service:
  type: ClusterIP
  port: 3001
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
config:
  logLevel: info
  nodeEnv: production
  authProvider: oidc
  oidcIssuerUrl: ""
  oidcAudience: ""
  oidcClientId: ""
  otelExporterOtlpEndpoint: http://otel-collector.observability:4318
  otelServiceName: digital-twin-platform-bff
  otelMetricExportInterval: "30000"
  otelSdkDisabled: "false"
oidc:
  secretName: bff-oidc-secret
  create: false
  issuerUrl: ""
  audience: ""
  clientId: ""
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
podDisruptionBudget:
  enabled: true
  minAvailable: 1
serviceAccount:
  create: true
  name: ""
