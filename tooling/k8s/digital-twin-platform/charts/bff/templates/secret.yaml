{{/*
OIDC Secret. Default behavior (create=false): renders nothing.
The chart references an externally-managed Secret by name
(.Values.oidc.secretName). Production users provision it via
sealed-secrets / external-secrets / vault-sidecar.

Dev escape hatch: set .Values.oidc.create=true and the chart
generates a Secret from .Values.oidc.{issuerUrl,audience,clientId}
so a fresh dev cluster can boot without an external secret
manager. The generated Secret is OPAQUE-typed and the keys
match what the Deployment's env.valueFrom.secretKeyRef expects.
*/}}
{{- if .Values.oidc.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.oidc.secretName }}
  labels:
    {{- include "bff.labels" . | nindent 4 }}
  annotations:
    # helm.sh/resource-policy: keep stops helm uninstall from
    # deleting the secret on `helm uninstall`. This is what we
    # want for production-style external secrets AND for the
    # dev escape hatch where the same secret may be reused
    # across reinstalls.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  OIDC_ISSUER_URL: {{ .Values.oidc.issuerUrl | quote }}
  OIDC_AUDIENCE: {{ .Values.oidc.audience | quote }}
  OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
{{- end }}
