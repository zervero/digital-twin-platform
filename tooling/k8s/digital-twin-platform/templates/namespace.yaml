{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    {{- include "dtp.labels" . | nindent 4 }}
    # Pod Security Standards: at the restricted level, workloads
    # must run as non-root and drop all capabilities. Both BFF
    # and web Dockerfiles already create a non-root user.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
{{- end }}
