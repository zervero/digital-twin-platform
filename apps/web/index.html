<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Twin Platform</title>
    <style>
      html,
      body,
      #app {
        height: 100%;
        margin: 0;
        /* V4-prep redesign: warm-neutral base, mapped from --dt-bg-base.
         * Inline value avoids a flash of white before tokens.css loads. */
        background: #0F1115;
      }
      body {
        /* V4-prep redesign: Inter (loaded via @fontsource/inter in main.ts)
         * with a system fallback. tokens.css declares the full --dt-font-ui
         * stack including the macOS / Windows fallbacks. */
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', 'Helvetica Neue', sans-serif;
        color: #E4E6EB;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
